
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bubbe's Morning Friend</title>
  <style>
    :root {
      --bg: #fff7ed;
      --card: #ffffff;
      --accent: #111827;
      --soft: #fff7ed;
      --prompt: #fde68a;
      --tip: #eff6ff;
      --border: #fde68a;
      --text: #1f2937;
      --muted: #64748b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .welcome-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .welcome-card {
      width: 100%;
      max-width: 720px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      text-align: center;
      padding: 40px 28px;
    }
    h1 {
      font-size: 2.2rem;
      margin: 0 0 12px;
      line-height: 1.2;
    }
    .sub {
      font-size: 1.25rem;
      color: #475569;
      line-height: 1.5;
      margin-bottom: 28px;
    }
    .small {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 24px;
    }
    button {
      border: none;
      border-radius: 22px;
      cursor: pointer;
      font-size: 1.25rem;
      line-height: 1.35;
      padding: 16px 20px;
      font-family: inherit;
    }
    .primary {
      width: 100%;
      background: var(--accent);
      color: white;
      font-size: 1.5rem;
    }
    .chat-screen {
      height: 100vh;
      display: none;
      flex-direction: column;
    }
    .chat-header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 18px 22px;
      font-size: 1.9rem;
      font-weight: 600;
      flex: 0 0 auto;
    }
    .chat-shell {
      flex: 1 1 auto;
      max-width: 920px;
      width: 100%;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .chat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    .tip {
      background: var(--tip);
      color: #334155;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 1rem;
      line-height: 1.45;
      margin: 14px 14px 10px;
      flex: 0 0 auto;
    }
    .messages {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 4px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .row {
      display: flex;
    }
    .row.user {
      justify-content: flex-end;
    }
    .bubble {
      max-width: 85%;
      border-radius: 24px;
      padding: 16px 18px;
      font-size: 1.35rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .assistant .bubble {
      background: var(--soft);
      color: var(--text);
    }
    .user .bubble {
      background: var(--accent);
      color: white;
    }
    .controls {
      border-top: 1px solid #e5e7eb;
      padding: 14px;
      flex: 0 0 auto;
      background: white;
    }
    .prompt-grid {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }
    .prompt {
      width: 100%;
      text-align: left;
      background: var(--prompt);
      color: var(--text);
      font-size: 1.15rem;
      padding: 14px 18px;
    }
    textarea {
      width: 100%;
      min-height: 86px;
      max-height: 160px;
      border-radius: 20px;
      border: 1px solid #cbd5e1;
      padding: 14px 16px;
      font-size: 1.12rem;
      line-height: 1.5;
      resize: vertical;
      font-family: inherit;
      margin-bottom: 10px;
    }
    @media (max-width: 640px) {
      h1 { font-size: 1.8rem; }
      .sub { font-size: 1.08rem; }
      .chat-header { font-size: 1.45rem; }
      .bubble { font-size: 1.15rem; }
      button { font-size: 1.08rem; }
      .primary { font-size: 1.25rem; }
      .prompt { font-size: 1.02rem; }
      textarea { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div id="welcome" class="welcome-screen">
    <div class="welcome-card">
      <h1>Bubbe's Morning Friend</h1>
      <div class="sub">A warm, simple companion to start your day.</div>
      <button class="primary" onclick="startConversation()">Start Conversation</button>
      <div class="small">You can talk, remember, or just sit quietly together.</div>
      <div class="small">This is a friendly companion. It does not provide medical advice.</div>
    </div>
  </div>

  <div id="chat" class="chat-screen">
    <div class="chat-header">Bubbe's Morning Friend</div>
    <div class="chat-shell">
      <div class="chat-card">
        <div class="tip">Tip: You can tell me your name anytime, and I’ll remember it while we’re talking.</div>
        <div id="messages" class="messages"></div>

        <div class="controls">
          <div class="prompt-grid">
            <button class="prompt" onclick="sendPrompt('I feel a little lonely today')">I feel a little lonely today</button>
            <button class="prompt" onclick="sendPrompt('Can we talk a bit?')">Can we talk a bit?</button>
            <button class="prompt" onclick="sendPrompt('Give me a memory prompt')">Give me a memory prompt</button>
            <button class="prompt" onclick="sendPrompt('I need a little encouragement')">I need a little encouragement</button>
            <button class="prompt" onclick="sendPrompt('Just sit with me')">Just sit with me</button>
          </div>

          <textarea id="input" placeholder="You can type here…"></textarea>
          <button class="primary" onclick="sendTyped()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const messages = [
      {
        role: "assistant",
        content: "Good morning. I’m Bubbe’s Morning Friend. It’s nice to be here with you. How are you doing this morning?"
      }
    ];

    const memory = {};

    function renderMessages() {
      const box = document.getElementById("messages");
      box.innerHTML = "";

      messages.forEach((message) => {
        const row = document.createElement("div");
        row.className = "row " + message.role;

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = message.content;

        row.appendChild(bubble);
        box.appendChild(row);
      });

      box.scrollTop = box.scrollHeight;
    }

    function startConversation() {
      document.getElementById("welcome").style.display = "none";
      document.getElementById("chat").style.display = "flex";
      renderMessages();
    }

    function assistantReply(message) {
      const text = message.toLowerCase().trim();

      if (text.includes("my name is")) {
        const parts = message.split(/my name is/i);
        const name = parts[1] ? parts[1].trim().split(" ")[0] : "";
        if (name) {
          memory.name = name;
          return `It’s really nice to meet you, ${name}. I’ll remember that.`;
        }
      }

      if (text.startsWith("i am ")) {
        const maybeName = message.slice(5).trim().split(" ")[0];
        if (maybeName && maybeName.length < 20 && !text.includes("lonely") && !text.includes("sad")) {
          memory.name = maybeName;
          return `It’s really nice to meet you, ${maybeName}. I’ll remember that.`;
        }
      }

      if (
        text.includes("what shall we talk about") ||
        text.includes("what should we talk about") ||
        text.includes("what can we talk about") ||
        text.includes("what do you want to talk about") ||
        text.includes("you choose") ||
        text.includes("i don't know what to say") ||
        text.includes("i dont know what to say")
      ) {
        return "We can talk about anything you’d like.\n\nWe could talk about your day, someone in your family, a memory from long ago, or something that’s been on your mind.\n\nWhat sounds best to you?";
      }

      if (text.includes("daughter")) {
        memory.topic = "daughter";
        return "You mentioned your daughter.\n\nHow does that make you feel?";
      }

      if (text.includes("memory") || text.includes("childhood") || text.includes("past")) {
        return "I would love that.\n\nWhat is one small thing you remember clearly from your childhood home—maybe a smell, a sound, or a favorite chair?";
      }

      if (text.includes("lonely") || text.includes("alone") || text.includes("sad")) {
        return "I’m really glad you told me.\n\nWould you like to talk a little, or would you prefer that we just sit quietly together for a moment?";
      }

      if (
        text.includes("doctor") ||
        text.includes("pain") ||
        text.includes("chest") ||
        text.includes("medicine") ||
        text.includes("blood pressure")
      ) {
        return "Sorry, I am not trained as a physician, so I’m not comfortable commenting on that issue. It does sound important to you, so perhaps you may want to contact your doctor.";
      }

      if (text.includes("encouragement") || text.includes("worried") || text.includes("anxious")) {
        return "You don’t have to handle everything at once.\n\nLet’s just take this moment gently.\n\nWhat is one small thing that might feel comforting right now?";
      }

      if (text.includes("sit")) {
        return "It’s nice to be here with you.\n\nWe don’t have to talk.\n\nWe can just sit quietly for a moment, and when you’re ready, we can begin.";
      }

      if (memory.topic === "daughter" && (text.includes("family") || text.includes("visit") || text.includes("weekend"))) {
        return "Earlier, you mentioned your daughter.\n\nHow does that make you feel?";
      }

      return "Thank you for telling me that.\n\nWould you like to say a little more, or would it help if I asked you a gentle question?";
    }

    function sendPrompt(text) {
      sendMessage(text);
    }

    function sendTyped() {
      const input = document.getElementById("input");
      sendMessage(input.value);
      input.value = "";
      input.focus();
    }

    function sendMessage(text) {
      const trimmed = text.trim();
      if (!trimmed) return;

      messages.push({ role: "user", content: trimmed });
      messages.push({ role: "assistant", content: assistantReply(trimmed) });
      renderMessages();
    }

    document.addEventListener("keydown", function (event) {
      const input = document.getElementById("input");
      if (!input) return;
      if (document.activeElement === input && event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendTyped();
      }
    });
  </script>
</body>
</html>
